; Maksimal ukuran file upload
upload_max_filesize = 20M

; Maksimal ukuran total POST (harus >= upload_max_filesize)
post_max_size = 20M

; (Opsional) jumlah maksimal file upload sekaligus
max_file_uploads = 20

; (Opsional) waktu eksekusi script (detik)
max_execution_time = 300

; (Opsional) waktu parsing input
max_input_time = 300

; (Opsional) limit memory PHP
memory_limit = 256M