version: '3.8'

services:
  app:
    build: .
    container_name: kutime-app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: smpn-kutime
      DB_USERNAME: root
      DB_PASSWORD: root
    networks:
      - kutime-network

  db:
    image: mysql:8
    container_name: kutime-db
    restart: always
    environment:
      MYSQL_DATABASE: smpn-kutime
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kutime-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: kutime-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - kutime-network

volumes:
  db_data:

networks:
  kutime-network: