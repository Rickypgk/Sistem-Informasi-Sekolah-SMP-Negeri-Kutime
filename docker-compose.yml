version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    # 🔥 FIX 1: Volume mount BENAR untuk hot reload
    volumes:
      # Mount PROJEK LOKAL → Container (bukan absolute path)
      - .:/var/www:cached  # 🔥 AUTO HOT RELOAD!
      - ./php.ini:/usr/local/etc/php/php.ini
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - XDEBUG_MODE=develop,debug  # 🔥 Debug mode
    # 🔥 FIX 2: Command lebih stabil
    command: sh -c "composer install --no-dev --optimize-autoloader && php artisan optimize:clear && php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: smpn_kutime
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    # 🔥 Health check
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ""
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: